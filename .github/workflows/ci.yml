name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Build
        run: cd frontend && ng build --configuration production

      - name: Check bundle size
        run: cd frontend && npm run check:bundle
        continue-on-error: true

      - name: Unit tests
        run: cd frontend && ng test --watch=false --code-coverage

      - name: Dependency audit
        run: cd frontend && npm audit --audit-level=high
        continue-on-error: true

      - name: SAST — Semgrep
        run: cd frontend && npx semgrep --config=../.semgrep.yml --error
        continue-on-error: true

  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.1'
          cache: true
          cache-dependency-path: 'backend/go.sum'

      - name: Build
        run: cd backend && go build ./cmd/api

      - name: Vet
        run: cd backend && go vet ./...

      - name: Unit tests
        run: cd backend && go test -v -race -coverprofile=coverage.out ./...

      - name: Lint — golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          working-directory: backend
          args: --timeout=5m

      - name: Vulnerability check — govulncheck
        run: cd backend && go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...
        continue-on-error: true

      - name: Security scan — gosec
        run: cd backend && go install github.com/securego/gosec/v2/cmd/gosec@latest && gosec ./...
        continue-on-error: true

      - name: SAST — Semgrep
        run: cd backend && npx semgrep --config=../.semgrep.yml --error
        continue-on-error: true

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.1'
          cache: true
          cache-dependency-path: 'backend/go.sum'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && ng build

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps

      - name: Start backend server
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb
          PORT: 8080
          GIN_MODE: debug
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          cd backend
          go run cmd/api/main.go &
          sleep 5
          curl http://localhost:8080/api/v1/health || echo "Server not ready yet"

      - name: Run Playwright tests
        run: cd frontend && npx playwright test
        env:
          BASE_URL: http://localhost:4200

      - name: Upload Playwright report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets with detect-secrets
        run: detect-secrets scan --baseline .secrets.baseline
        continue-on-error: true

  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [frontend, backend, e2e, security]
    if: always()

    steps:
      - name: Check CI results
        run: |
          if [[ "${{ needs.frontend.result }}" == "failure" || "${{ needs.backend.result }}" == "failure" || "${{ needs.e2e.result }}" == "failure" ]]; then
            echo "❌ CI Failed"
            exit 1
          fi
          echo "✅ CI Passed"
